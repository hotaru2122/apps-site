<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naoki Hotta Apps</title>
    <meta name="description" content="Naoki Hotta が公開しているアプリの紹介ページとプライバシーポリシー一覧です。" />
    <style>
      :root {
        --bg: #f7f8fb;
        --surface: #ffffff;
        --text: #17212b;
        --muted: #657482;
        --line: rgba(23, 33, 43, 0.1);
        --primary: #0f7cff;
        --shadow: 0 20px 50px rgba(30, 48, 70, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 0%, rgba(15, 124, 255, 0.14), transparent 30%),
          radial-gradient(circle at 85% 12%, rgba(20, 197, 201, 0.16), transparent 28%),
          var(--bg);
        line-height: 1.7;
      }

      body,
      .container {
        display: flex;
        flex-direction: column;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .container {
        width: min(calc(100% - 40px), 980px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 56px 0;
      }

      header {
        margin-bottom: 34px;
      }

      .eyebrow {
        margin: 0;
        color: var(--primary);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 0;
        font-size: clamp(2.4rem, 5vw, 4.6rem);
        line-height: 1.05;
      }

      .lead {
        max-width: 44rem;
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 1.04rem;
      }

      .app-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        margin-bottom: 30px;
      }

      .app-card {
        display: flex;
        min-height: 250px;
        flex-direction: column;
        justify-content: space-between;
        padding: 24px;
        background: rgba(255, 255, 255, 0.84);
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .app-card h2 {
        margin: 0;
        font-size: 1.45rem;
      }

      .app-card p {
        margin: 10px 0 0;
        color: var(--muted);
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 22px;
      }

      .button {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        padding: 0 15px;
        border-radius: 999px;
        font-weight: 800;
        background: #fff;
        border: 1px solid var(--line);
      }

      .button.primary {
        color: #fff;
        background: var(--primary);
        border-color: var(--primary);
      }

      footer {
        margin-top: auto;
        padding-top: 22px;
        color: var(--muted);
        border-top: 1px solid var(--line);
      }

      @media (max-width: 820px) {
        .app-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <p class="eyebrow">Apps</p>
        <h1>Naoki Hotta Apps</h1>
        <p class="lead">
          公開中アプリの紹介ページとプライバシーポリシーをまとめています。
        </p>
      </header>

      <main class="app-grid">
        <article class="app-card">
          <div>
            <h2>CircleMap</h2>
            <p>地図上にピンと半径円を配置して、距離感を視覚的に把握できるiPhoneアプリです。</p>
          </div>
          <div class="links">
            <a class="button primary" href="./CircleMap/">紹介ページ</a>
            <a class="button" href="./CircleMap/privacy.html">Privacy</a>
          </div>
        </article>

        <article class="app-card">
          <div>
            <h2>あと何日？</h2>
            <p>純正カレンダーと連携して、次の予定までの残り日数を表示するウィジェット中心のアプリです。</p>
          </div>
          <div class="links">
            <a class="button primary" href="./CountdownCalendar/">紹介ページ</a>
            <a class="button" href="./CountdownCalendar/privacy.html">Privacy</a>
          </div>
        </article>

        <article class="app-card">
          <div>
            <h2>SimpleBigCounter</h2>
            <p>Apple Watchで素早く見やすく数えられる、シンプルなカウンターアプリです。</p>
          </div>
          <div class="links">
            <a class="button primary" href="./SimpleBigCounter/">紹介ページ</a>
            <a class="button" href="./SimpleBigCounter/privacy.html">Privacy</a>
          </div>
        </article>
      </main>

      <footer>© 2026 Naoki Hotta</footer>
    </div>
  </body>
</html>
